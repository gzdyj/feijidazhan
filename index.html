<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>星际猎手 - 飞机大战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#e0e0f0}
canvas{display:block;position:fixed;top:0;left:0;width:100vw;height:100vh}
.screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;align-items:center;justify-content:center}
.screen.active{display:flex}
.overlay{background:rgba(5,5,30,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.panel{background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:32px;max-width:420px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.menu-content{text-align:center;position:relative;z-index:2}
.logo-container{margin-bottom:28px}
.logo-container svg{filter:drop-shadow(0 0 20px rgba(0,212,255,0.5));margin-bottom:12px}
.logo-container h1{font-size:36px;font-weight:800;background:linear-gradient(135deg,#00d4ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px}
.subtitle{font-size:14px;color:rgba(255,255,255,0.5);margin-top:6px;letter-spacing:2px}
.btn{display:block;width:100%;padding:14px 24px;margin:8px 0;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all .25s ease;letter-spacing:1px}
.btn:active{transform:scale(0.97)}
.btn.primary{background:linear-gradient(135deg,#00d4ff,#7b2ff7);color:#fff;box-shadow:0 4px 20px rgba(0,212,255,0.3)}
.btn.primary:hover{box-shadow:0 6px 30px rgba(0,212,255,0.5);transform:translateY(-1px)}
.btn.secondary{background:rgba(255,255,255,0.08);color:#e0e0f0;border:1px solid rgba(255,255,255,0.15)}
.btn.secondary:hover{background:rgba(255,255,255,0.12)}
.btn.ghost{background:transparent;color:rgba(255,255,255,0.6);font-size:14px}
.btn.ghost:hover{color:#fff}
.btn.danger{color:#ff4757}
.hud{display:none;position:fixed;top:0;left:0;width:100%;z-index:5;padding:12px 16px;padding-top:env(safe-area-inset-top,12px)}
.hud .hud-top{display:flex;justify-content:space-between;align-items:flex-start}
.hud-item{display:flex;align-items:center;gap:4px;color:#fff;font-size:14px;font-weight:600;text-shadow:0 2px 8px rgba(0,0,0,0.8);margin-bottom:4px}
.hud-item .label{font-size:11px;font-weight:500;color:rgba(255,255,255,0.5);margin-right:4px;letter-spacing:1px}
.hud-bottom{margin-top:8px}
.boss-bar{display:none;width:100%;height:18px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;position:relative}
.boss-fill{height:100%;width:100%;background:linear-gradient(90deg,#ff4757,#ff6b81);border-radius:10px;transition:width .3s ease}
.boss-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.6);letter-spacing:2px}
.pause-btn{display:none;position:fixed;top:env(safe-area-inset-top,12px);right:12px;z-index:6;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);color:#fff;font-size:18px;cursor:pointer;align-items:center;justify-content:center;transition:all .2s}
.pause-btn:hover{background:rgba(255,255,255,0.1)}
.coin{display:inline-flex;align-items:center;gap:6px;font-size:16px;font-weight:700;color:#ffd700;cursor:pointer;padding:6px 12px;border-radius:20px;background:rgba(255,215,0,0.1);transition:all .2s}
.coin:hover{background:rgba(255,215,0,0.2)}
.vip{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:700;color:#ffd700;cursor:pointer;padding:6px 14px;border-radius:20px;background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,165,0,0.1));border:1px solid rgba(255,215,0,0.3);transition:all .2s}
.vip:hover{background:linear-gradient(135deg,rgba(255,215,0,0.25),rgba(255,165,0,0.2))}
.menu-footer{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:20px}
.shop-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.shop-hd h2{font-size:20px}
.shop-hd div{font-size:18px;font-weight:700;color:#ffd700}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:rgba(255,255,255,0.04);border-radius:10px;padding:3px}
.tab{flex:1;padding:8px 0;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:rgba(255,255,255,0.5);transition:all .25s}
.tab.active{background:rgba(0,212,255,0.2);color:#00d4ff;box-shadow:0 2px 10px rgba(0,212,255,0.1)}
.items{max-height:320px;overflow-y:auto;margin-bottom:12px}
.items::-webkit-scrollbar{width:4px}
.items::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:4px}
.item-card{display:flex;align-items:center;gap:12px;padding:12px;margin-bottom:8px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);transition:all .2s}
.item-card:hover{background:rgba(255,255,255,0.08)}
.item-card .icon{font-size:28px;width:44px;text-align:center}
.item-card .info{flex:1;text-align:left}
.item-card .info .name{font-size:14px;font-weight:700;color:#fff}
.item-card .info .desc{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
.item-card .info .owned{font-size:11px;color:#00d4ff;font-weight:600}
.item-card .buy-btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.item-card .buy-btn.owned{background:rgba(0,212,255,0.15);color:#00d4ff}
.item-card .buy-btn.buy{background:linear-gradient(135deg,#00d4ff,#7b2ff7);color:#fff}
.item-card .buy-btn.locked{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.3);cursor:not-allowed}
.item-card .buy-btn.equipped{background:rgba(0,212,255,0.2);color:#00d4ff;border:1px solid #00d4ff}
.gameover .go-icon{font-size:48px;margin-bottom:8px}
.gameover h2{margin-bottom:16px;font-size:22px}
.stats{margin-bottom:20px}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.row:last-child{border-bottom:none}
.lbl{font-size:14px;color:rgba(255,255,255,0.5)}
.val{font-size:16px;font-weight:700;color:#fff}
.val.coin{color:#ffd700}
.go-btns{margin-bottom:8px}
.double{padding:10px;border-radius:10px;background:rgba(255,215,0,0.06);border:1px dashed rgba(255,215,0,0.2);color:#ffd700;font-size:13px;cursor:pointer;transition:all .2s}
.double:hover{background:rgba(255,215,0,0.12)}
.setting{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.setting:last-of-type{border-bottom:none}
.setting label{font-size:14px;color:rgba(255,255,255,0.7)}
.toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,0.15);cursor:pointer;position:relative;transition:all .3s}
.toggle.on{background:rgba(0,212,255,0.4)}
.knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:all .3s;box-shadow:0 2px 6px rgba(0,0,0,0.2)}
.toggle.on .knob{left:22px;background:#00d4ff}
.sel{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px 12px;color:#fff;font-size:13px;outline:none;cursor:pointer}
.sel option{background:#1a1a3a;color:#fff}
.notif{display:none;position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:20;padding:12px 24px;border-radius:12px;background:linear-gradient(135deg,rgba(0,212,255,0.2),rgba(123,47,247,0.2));backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:14px;font-weight:600;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,0.4);animation:slideDown .3s ease}
.achievement-list,.leaderboard-list{max-height:300px;overflow-y:auto;margin:12px 0}
.achv-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;background:rgba(255,255,255,0.04);margin-bottom:6px;text-align:left}
.achv-item .a-icon{font-size:24px}
.achv-item .a-info{flex:1}
.achv-item .a-info .a-name{font-size:13px;font-weight:600;color:#fff}
.achv-item .a-info .a-desc{font-size:11px;color:rgba(255,255,255,0.4)}
.achv-item .a-check{font-size:16px}
.achv-item.done{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.15)}
.lb-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;background:rgba(255,255,255,0.04);margin-bottom:6px}
.lb-item .rank{width:28px;text-align:center;font-weight:800;font-size:16px}
.lb-item .rank.gold{color:#ffd700}
.lb-item .rank.silver{color:#c0c0c0}
.lb-item .rank.bronze{color:#cd7f32}
.lb-item .lb-name{flex:1;font-size:14px;font-weight:600;color:#fff}
.lb-item .lb-score{font-size:14px;color:#ffd700;font-weight:700}
.d-icon{font-size:48px;margin-bottom:8px}
.d-amount{font-size:32px;font-weight:800;color:#ffd700;margin:12px 0;text-shadow:0 0 20px rgba(255,215,0,0.3)}
.daily-text{color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:4px}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.hud-xp{width:100%;max-width:300px;margin:0 auto;height:16px;background:rgba(255,255,255,0.08);border-radius:8px;overflow:hidden;position:relative;border:1px solid rgba(255,255,255,0.08);}
.xp-fill{height:100%;background:linear-gradient(90deg,#7b2ff7,#00d4ff);border-radius:8px;transition:width .3s;width:0%}
.xp-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.6);letter-spacing:1px}
.ab-btn{position:fixed;bottom:30px;right:30px;z-index:6;width:54px;height:54px;border-radius:50%;border:2px solid rgba(0,212,255,0.4);background:linear-gradient(135deg,rgba(0,212,255,0.25),rgba(123,47,247,0.2));backdrop-filter:blur(8px);color:#fff;font-size:22px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,212,255,0.2)}
.ab-btn:hover{transform:scale(1.08);border-color:#00d4ff}
.ab-btn:active{transform:scale(0.95)}
.hud-xp{margin-top:6px}
</style>
</head>
<canvas id="gameCanvas"></canvas>
<div id="menuScreen" class="screen active">
  <div class="menu-content">
    <div class="logo-container">
      <svg width="64" height="64" viewBox="0 0 80 80">
        <polygon points="40,5 60,35 65,70 40,55 15,70 20,35" fill="url(#sg)" stroke="#00d4ff" stroke-width="2"/>
        <defs><linearGradient id="sg" x1="0" y1="0" x2="100%" y2="100%">
          <stop offset="0" stop-color="#00d4ff"/><stop offset="100%" stop-color="#7b2ff7"/>
        </linearGradient></defs>
      </svg>
      <h1>星际猎手</h1>
      <p class="subtitle">⚡ 经典飞机大战 · 全新体验 ⚡</p>
    </div>
    <div class="menu-buttons">
      <button class="btn primary" onclick="Game.startGame()">🚀 开始战斗</button>
      <button class="btn secondary" onclick="UI.showShop()">🛒 战机商店</button>
      <button class="btn secondary" onclick="UI.showAchv()">🏆 成就</button>
      <button class="btn ghost" onclick="UI.showLb()">📊 排行榜</button>
    </div>
    <div class="menu-footer">
      <div class="coin" onclick="UI.showShop()">🪙 <span id="menuCoins">0</span></div>
      <div class="vip" id="menuVip" onclick="UI.showShop()">⚡ 开通 VIP</div>
    </div>
  </div>
</div>
<div id="gameHud" class="hud">
  <div class="hud-top">
    <div class="hud-left">
      <div class="hud-item"><span class="label">分数</span><span id="scoreDisp">0</span></div>
      <div class="hud-item">🪙 <span id="hudCoins">0</span></div>
    </div>
    <div class="hud-center"><div class="hud-item"><span class="label">波次</span><span id="waveDisp">1</span></div></div>
    <div class="hud-right">
      <div class="hud-item"><span id="livesDisp">❤️❤️❤️</span></div>
      <div class="hud-item" id="weaponDisp">🔫 基础</div>
    </div>
  </div>
  <div class="hud-xp" id="xpBar"><div class="xp-fill" id="xpFill"></div><span class="xp-text" id="xpText">Lv 1</span></div>
  <div class="hud-bottom">
    <div class="boss-bar" id="bossBar"><div class="boss-fill" id="bossFill"></div><span class="boss-text" id="bossText">BOSS</span></div>
  </div>
</div>
<button class="ab-btn" id="abBtn" onclick="Game.useAbility()">💣</button>
<button class="pause-btn" id="pauseBtn" onclick="Game.togglePause()">⏸</button>
<div id="pauseScreen" class="screen overlay">
  <div class="panel"><h2>⏸ 已暂停</h2>
    <button class="btn primary" onclick="Game.togglePause()">继续游戏</button>
    <button class="btn ghost" onclick="UI.showSettings()">设置</button>
    <button class="btn ghost danger" onclick="Game.quit()">退出</button>
  </div>
</div>
<div id="settingsScreen" class="screen overlay">
  <div class="panel"><h2>⚙️ 设置</h2>
    <div class="setting"><label>音乐</label><div class="toggle" onclick="S.toggleMusic()"><div class="knob" id="musicK"></div></div></div>
    <div class="setting"><label>音效</label><div class="toggle" onclick="S.toggleSfx()"><div class="knob" id="sfxK"></div></div></div>
    <div class="setting"><label>振动</label><div class="toggle" onclick="S.toggleVib()"><div class="knob" id="vibK"></div></div></div>
    <div class="setting"><label>操作</label><select id="ctrlSel" onchange="S.setCtrl(this.value)" class="sel">
      <option value="mouse">鼠标跟随</option>
      <option value="keyboard">键盘方向键</option>
      <option value="touch">触屏拖拽</option>
    </select></div>
    <button class="btn ghost" onclick="UI.hideSettings()">← 返回</button>
  </div>
</div>
<div id="shopScreen" class="screen overlay">
  <div class="panel shop">
    <div class="shop-hd"><h2>🛒 战机商店</h2><div>🪙 <span id="shopCoins">0</span></div></div>
    <div class="tabs">
      <button class="tab active" onclick="UI.switchTab('ships',this)">战机</button>
      <button class="tab" onclick="UI.switchTab('weapons',this)">武器</button>
      <button class="tab" onclick="UI.switchTab('powerups',this)">道具</button>
      <button class="tab" onclick="UI.switchTab('vip',this)">VIP</button>
    </div>
    <div class="items" id="shopItems"></div>
    <button class="btn ghost" onclick="UI.hideShop()">← 返回</button>
  </div>
</div>
<div id="goScreen" class="screen overlay">
  <div class="panel gameover">
    <div class="go-icon">💥</div>
    <h2>战斗结束</h2>
    <div class="stats">
      <div class="row"><span class="lbl">最终得分</span><span class="val" id="fScore">0</span></div>
      <div class="row"><span class="lbl">击毁敌机</span><span class="val" id="fKills">0</span></div>
      <div class="row"><span class="lbl">生存波次</span><span class="val" id="fWave">0</span></div>
      <div class="row"><span class="lbl">获得金币</span><span class="val coin" id="fCoins">+0 🪙</span></div>
    </div>
    <div class="go-btns">
      <button class="btn primary" onclick="UI.revive()" id="reviveBtn">👁️ 看广告复活</button>
      <button class="btn secondary" onclick="Game.startGame()">再来一局</button>
      <button class="btn ghost" onclick="Game.quit()">返回菜单</button>
    </div>
    <div class="double" onclick="UI.doubleDown()" id="doubleBtn">👆 看广告领取双倍金币</div>
  </div>
</div>
<div id="achvScreen" class="screen overlay">
  <div class="panel"><h2>🏆 成就</h2><div id="achvList"></div>
    <button class="btn ghost" onclick="UI.hideAchv()">← 返回</button>
  </div>
</div>
<div id="lbScreen" class="screen overlay">
  <div class="panel"><h2>📊 排行榜</h2><div id="lbList"></div>
    <button class="btn ghost" onclick="UI.hideLb()">← 返回</button>
  </div>
</div>
<div id="puNotif" class="notif"></div>
<div id="dailyScreen" class="screen overlay">
  <div class="panel">
    <div class="d-icon">🎁</div>
    <h2>每日奖励</h2>
    <p>今日登录奖励</p>
    <div class="d-amount" id="dailyAmt">+50 🪙</div>
    <button class="btn primary" onclick="UI.collectDaily()">领取</button>
    <button class="btn ghost" onclick="UI.watchDaily()">看广告翻倍</button>
  </div>
</div>
<script src="js/all.js"></script>



<script>

var S = (function(){...})();


var Audio = (function(){...})();

var Game = (function(){
  var canvas, ctx, W, H;
  var player, bullets=[], enemies=[], particles=[], stars=[], powerups=[];
  var score=0, kills=0, wave=1, coins=0, lives=3, maxLives=5;
  var running=false, paused=false, gameOver=false;
  var frameId=null, spawnTimer=0, waveEnemiesLeft=0, bossActive=false;
  var mouseX=0, mouseY=0, keys={}, weaponLevel=0, shieldActive=false;
  var weaponNames=['基础','双发','散射','激光','弹幕'];
  var weaponTypes=['single','dual','spread','laser','barrage'];
  var currentShip=0, ownedShips=[0], ownedWeapons=[0];
  var combo=0, comboTimer=0, reviveCount=0;
  var xp=0, xpToNext=100, playerLevel=1;
  var floatingTexts=[], shakeIntensity=0;
  var abilityType="bomb", abilityCooldown=0, abilityMaxCd=900;
  var levelBonuses={fireRate:1,speed:1,damage:1,extraLife:0,startShield:false};

  var ships = [
    {name:'先锋号',desc:'均衡型战机',color:'#00d4ff',speed:5,hp:3,price:0},
    {name:'掠食者',desc:'高速型战机',color:'#ff6b81',speed:7,hp:2,price:500},
    {name:'堡垒号',desc:'重型战机',color:'#ffd700',speed:3.5,hp:5,price:1000},
    {name:'暗影',desc:'隐形战机',color:'#a855f7',speed:6,hp:3,price:2000},
    {name:'凤凰',desc:'传说战机',color:'#ff4757',speed:8,hp:4,price:5000}
  ];
  var weapons = [
    {name:'基础',desc:'单发子弹',price:0,dmg:1,rate:12,type:'single'},
    {name:'双发',desc:'双发并行',price:300,dmg:1,rate:10,type:'dual'},
    {name:'散射',desc:'三发散弹',price:800,dmg:1.2,rate:14,type:'spread'},
    {name:'激光',desc:'穿透激光',price:1500,dmg:2,rate:8,type:'laser'},
    {name:'弹幕',desc:'全屏弹幕',price:3000,dmg:1.5,rate:6,type:'barrage'}
  ];
  var powerupTypes = [
    {name:'双倍火力',icon:'🔥',effect:'weapon',dur:5000},
    {name:'护盾',icon:'🛡️',effect:'shield',dur:5000},
    {name:'生命',icon:'❤️',effect:'life',dur:0},
    {name:'急速',icon:'⚡',effect:'speed',dur:3000},
    {name:'金币',icon:'🪙',effect:'coin',dur:0}
  ];
  var achievements = [
    {id:'first',name:'初次飞行',desc:'完成第一局游戏',icon:'🚀',check:function(){return true;}},
    {id:'killer',name:'小试牛刀',desc:'击落100架敌机',icon:'💀',check:function(){return ks100>=100;}},
    {id:'wave10',name:'太空老兵',desc:'到达第10波',icon:'⭐',check:function(){return maxWave>=10;}},
    {id:'wave20',name:'星际战神',desc:'到达第20波',icon:'🌟',check:function(){return maxWave>=20;}},
    {id:'score5k',name:'高分猎手',desc:'单局得分5000',icon:'🎯',check:function(){return highScore>=5000;}},
    {id:'score10k',name:'传奇机长',desc:'单局得分10000',icon:'🏅',check:function(){return highScore>=10000;}},
    {id:'collector',name:'收藏家',desc:'购买3架战机',icon:'🛒',check:function(){return ownedShips.length>=3;}},
    {id:'rich',name:'百万富翁',desc:'累计获得5000金币',icon:'💰',check:function(){return totalCoins>=5000;}}
  ];
  var highScore=0, maxWave=0, ks100=0, totalCoins=0;
  var dailyCollected=false;

  function addFloatingText(x,y,text,col){
    floatingTexts.push({x:x,y:y,text:text,col:col||"#fff",life:40,vy:-1.5});
  }
  function addXP(amt){
    xp+=amt;
    while(xp>=xpToNext){
      xp-=xpToNext;
      playerLevel++;
      xpToNext=Math.floor(100*Math.pow(1.15,playerLevel-1));
      if(playerLevel>=2) levelBonuses.fireRate=1.1;
      if(playerLevel>=3) levelBonuses.startShield=true;
      if(playerLevel>=4) levelBonuses.speed=1.1;
      if(playerLevel>=5) levelBonuses.extraLife=1;
      UI.showNotif("🎉 升级! 等级 "+playerLevel,"");
    }
  }
  function useAbility(){
    if(abilityCooldown>0||!player||!running) return;
    for(var i=enemies.length-1;i>=0;i--){
      var e2=enemies[i];
      if(e2&&e2.hp>0){
        spawnParticles(e2.x,e2.y,8,e2.color||"#ff4757",4);
        kills++;
      }
    }
    enemies=[];
    spawnParticles(W/2,H/2,40,"#fff",10);
    score+=100;
    Audio.explosion();
    shakeIntensity=8;
    abilityCooldown=abilityMaxCd;
  }
  function init(){
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);
    load();
    initStars();
    initInput();
    UI.updateCoins();
    UI.renderShop();
    UI.renderAchievements();
    UI.renderLeaderboard();
    checkDaily();
    loop();
  }
  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  function initStars(){
    stars = [];
    for(var i=0;i<120;i++){
      stars.push({
        x:Math.random()*W, y:Math.random()*H,
        r:Math.random()*2+0.5, s:Math.random()*2+0.5,
        b:Math.random()*0.6+0.4
      });
    }
  }
  function initInput(){
    canvas.addEventListener('mousemove',function(e){
      mouseX=e.clientX; mouseY=e.clientY;
    });
    canvas.addEventListener('touchmove',function(e){
      e.preventDefault();
      var t=e.touches[0];
      mouseX=t.clientX; mouseY=t.clientY;
    },{passive:false});
    canvas.addEventListener('touchstart',function(e){
      e.preventDefault();
      var t=e.touches[0];
      mouseX=t.clientX; mouseY=t.clientY;
    },{passive:false});
    document.addEventListener('keydown',function(e){
      keys[e.key]=true;
      if(e.key===' ') useAbility();
      if(e.key==='Escape') e.preventDefault();
    });
    document.addEventListener('keyup',function(e){ keys[e.key]=false; });
  }

  function startGame(){
    document.getElementById('goScreen')&&document.getElementById('goScreen').classList.remove('active');
    document.getElementById('achvScreen')&&document.getElementById('achvScreen').classList.remove('active');
    document.getElementById('lbScreen')&&document.getElementById('lbScreen').classList.remove('active');
    document.getElementById('dailyScreen')&&document.getElementById('dailyScreen').classList.remove('active');
    document.getElementById('shopScreen')&&document.getElementById('shopScreen').classList.remove('active');
    document.getElementById('settingsScreen')&&document.getElementById('settingsScreen').classList.remove('active');
    player = {x:W/2,y:H-80,w:30,h:36,hp:ships[currentShip].hp+(levelBonuses.extraLife||0),maxHp:ships[currentShip].hp+(levelBonuses.extraLife||0),speed:ships[currentShip].speed*(levelBonuses.speed||1),invuln:0};
    xp=0; xpToNext=100; abilityCooldown=0;
    shieldActive=levelBonuses.startShield||false;
    bullets = []; enemies = []; particles = []; powerups = [];
    score = 0; kills = 0; wave = 1; lives = 3; combo = 0; comboTimer = 0;
    waveEnemiesLeft = 5; bossActive = false; spawnTimer = 0; weaponLevel = 0;
    shieldActive = false; gameOver = false; running = true; paused = false;

  function loop(){
    if(!running && !gameOver) { frameId = requestAnimationFrame(loop); return; }
    if(!paused && running) update();
    draw();
    frameId = requestAnimationFrame(loop);
  }

  function getWeapon(){ return weapons[weaponLevel]||weapons[0]; }

  function update(){
    // boss warning flash
    for(var i=0;i<enemies.length;i++){
      var e=enemies[i];
      if(e.boss && e.warning>0 && e.warning%4<2){
        ctx.fillStyle='rgba(255,0,50,0.08)';
        ctx.fillRect(0,0,W,H);
      }
    }
    // player movement
    if(player){
      var spd = player.speed * (keys['Shift']?1.6:1);
      if(keys['ArrowLeft']||keys['a']) player.x -= spd;
      if(keys['ArrowRight']||keys['d']) player.x += spd;
      if(keys['ArrowUp']||keys['w']) player.y -= spd;
      if(keys['ArrowDown']||keys['s']) player.y += spd;
      // mouse follow in mouse mode
      if(S.control==='mouse'){
        var dx = mouseX - player.x, dy = mouseY - player.y;
        var dist = Math.sqrt(dx*dx+dy*dy);
        if(dist>2){
          player.x += (dx/dist)*Math.min(spd*1.5,dist);
          player.y += (dy/dist)*Math.min(spd*1.5,dist);
        }
      }
      player.x = Math.max(20,Math.min(W-20,player.x));
      player.y = Math.max(40,Math.min(H-40,player.y));
      if(player.invuln>0) player.invuln--;
    }
    // auto fire
    if(player && running){
      timer++;
      if(timer%(getWeapon().rate||12)===0){
        fire();
      }
    }
    // update bullets
    for(var i=bullets.length-1;i>=0;i--){
      var b2=bullets[i];
      b2.y-=b2.speed||8;
      b2.x+=b2.vx||0;
      if(b2.life) b2.life--;
      if(b2.y<-20||b2.y>H+20||b2.x<-20||b2.x>W+20||(b2.life!==undefined&&b2.life<=0)){
        bullets.splice(i,1); continue;
      }
      // enemy collision
      for(var j=enemies.length-1;j>=0;j--){
        var e=enemies[j];
        if(e.hp<=0) continue;
        var dx=b2.x-e.x, dy=b2.y-e.y;
        if(Math.sqrt(dx*dx+dy*dy)<(e.r||18)+6){
          e.hp-=b2.dmg||1;
          spawnParticles(e.x,e.y,3,e.color||'#ff4757',2);
          Audio.hit();
          if(e.hp<=0){
            killEnemy(e,i);
          }
          bullets.splice(i,1);
          break;
        }
      }
    }
    // update enemies
    for(var i=enemies.length-1;i>=0;i--){
      var e=enemies[i];
      if(e.hp<=0){ enemies.splice(i,1); continue; }
      if(e.boss){ enemyFire(e); }
      // move towards player
      var angle = Math.atan2(player.y-e.y, player.x-e.x);
      // kamikaze - dive at player
      if(e.type==='k'){
        if(!e.kamiDive){e.kamiDive=0;}
        e.kamiDive++;
        if(e.kamiDive>40){
          var da=Math.atan2(player.y-e.y,player.x-e.x);
          e.x+=Math.cos(da)*6;
          e.y+=Math.sin(da)*6;
        }else{
          e.x+=Math.cos(angle)*(e.speed||1.5);
          e.y+=Math.sin(angle)*(e.speed||1.5);
        }
      }else if(e.type==='s'){
        // sniper - stay at range, fire occasionally
        var dist=Math.sqrt(Math.pow(player.x-e.x,2)+Math.pow(player.y-e.y,2));
        if(dist<200){angle+=Math.PI;}
        e.x+=Math.cos(angle)*(e.speed||0.5);
        e.y+=Math.sin(angle)*(e.speed||0.5);
        e.snipeTimer=(e.snipeTimer||0)+1;
        if(e.snipeTimer%90===0){
          if(!e.bullets)e.bullets=[];
          var sa=Math.atan2(player.y-e.y,player.x-e.x);
          e.bullets.push({x:e.x,y:e.y+15,vx:Math.cos(sa)*5,vy:Math.sin(sa)*5,sz:3,col:'#00d4ff',glow:'#00ff88'});
        }
      }else if(e.boss){
        e.x+=Math.cos(angle)*0.8;
        e.y+=Math.sin(angle)*0.3;
        e.x=Math.max(80,Math.min(W-80,e.x));
      }else{
        e.x+=Math.cos(angle)*(e.speed||1.5);
        e.y+=Math.sin(angle)*(e.speed||1.5);
      }
      // enemy bullet collision with player
      if(e.bullets){
        for(var k=e.bullets.length-1;k>=0;k--){
          var eb=e.bullets[k];
          eb.x+=eb.vx||0; eb.y+=eb.vy||0;
          if(eb.y>H||eb.y<-20||eb.x<-20||eb.x>W+20){ e.bullets.splice(k,1); continue; }
          if(player && player.hp>0){
            var ddx=eb.x-player.x, ddy=eb.y-player.y;
            var r=(eb.sz||3)+16;
            if(Math.sqrt(ddx*ddx+ddy*ddy)<r){
              hitPlayer();
              e.bullets.splice(k,1);
            }
          }
        }
      }
      // player collision
      if(player && player.hp>0){
        var dx=player.x-e.x, dy=player.y-e.y;
        if(Math.sqrt(dx*dx+dy*dy)<(e.r||18)+18){
          if(!e.boss || true){
            if(e.hp>0){
              e.hp=0;
              killEnemy(e);
              hitPlayer();
            }
          }
        }
      }
      // off-screen cleanup
      if(e.y>H+50 || e.x<-50 || e.x>W+50){
        if(!e.boss) enemies.splice(i,1);
      }
    }
    // powerups
    for(var i=powerups.length-1;i>=0;i--){
      var p=powerups[i];
      p.y+=1.5;
      if(p.y>H+20){ powerups.splice(i,1); continue; }
      if(player && player.hp>0){
        var dx = p.x-player.x, dy = p.y-player.y;
        if(Math.sqrt(dx*dx+dy*dy)<24){
          collectPowerup(p);
          powerups.splice(i,1);
        }
      }
    }
    // floating text update
    for(var fti=floatingTexts.length-1;fti>=0;fti--){
      var ft=floatingTexts[fti];
      ft.y+=ft.vy||-1.5;
      ft.life--;
      if(ft.life<=0) floatingTexts.splice(fti,1);
    }
    if(shakeIntensity>0) shakeIntensity*=0.85;
    if(shakeIntensity<0.3) shakeIntensity=0;
    if(abilityCooldown>0) abilityCooldown--;
    // particles
    for(var i=particles.length-1;i>=0;i--){
      var p=particles[i];
      p.x+=p.vx; p.y+=p.vy;
      p.vy+=0.05;
      p.life--;
      if(p.life<=0) particles.splice(i,1);
    }
    // combo timer
    if(comboTimer>0) comboTimer--;
    else combo=0;
    // spawning
    if(!bossActive){
      spawnTimer++;
      var spawnRate = Math.max(15,60-wave*2);
      if(spawnTimer>=spawnRate && waveEnemiesLeft>0){
        spawnEnemy();
        spawnTimer=0;
      }
    }
    // wave progression
    if(!bossActive && waveEnemiesLeft<=0 && enemies.length===0){
      if(wave%5===0){
        bossActive = true;
        spawnBoss();
        Audio.bossWarning();
        document.getElementById('bossBar').style.display = 'block';
        UI.showNotif('⚠️ BOSS 来袭！','danger');
      }else{
        wave++;
        waveEnemiesLeft = 5+wave*2;
        UI.showNotif('⚔️ 第 '+wave+' 波','');
        Audio.click();
      }
    }
    // boss check
    if(bossActive){
      var hasBoss = false;
      for(var i=0;i<enemies.length;i++){
        if(enemies[i].boss){ hasBoss=true;
          document.getElementById('bossFill').style.width = Math.max(0,enemies[i].hp/enemies[i].maxHp*100)+'%'; break; }
      }
      if(!hasBoss){ bossActive=false;
        document.getElementById('bossBar').style.display = 'none';
        wave++;
        waveEnemiesLeft = 5+wave*2;
        Audio.coin();
        coins+=50;
        UI.updateCoins();
        UI.showNotif('🎉 BOSS 击败！+50 🪙','');
      }
    }
    // update HUD
    document.getElementById('scoreDisp').textContent = score;
    document.getElementById('hudCoins').textContent = coins;
    document.getElementById('waveDisp').textContent = wave;
    var h = '';
    for(var i=0;i<lives;i++) h+='❤️';
    document.getElementById('livesDisp').textContent = h||'💀';
    document.getElementById('weaponDisp').textContent = '🔫 '+weaponNames[weaponLevel];
    // XP bar
    var xpPct=Math.min(100,Math.floor(xp/xpToNext*100));
    var xpFill=document.getElementById('xpFill');
    var xpText=document.getElementById('xpText');
    if(xpFill)xpFill.style.width=xpPct+'%';
    if(xpText)xpText.textContent='Lv '+playerLevel+' '+xpPct+'%';
    // ability button
    var abBtn=document.getElementById('abBtn');
    if(abBtn){
      if(abilityCooldown>0){
        abBtn.textContent='⏳'+Math.ceil(abilityCooldown/60)+'s';
        abBtn.style.background='rgba(255,100,100,0.3)';
      }else{
        abBtn.textContent='💣';
        abBtn.style.background='';
      }
    }
  }
  var timer=0;

  function fire(){
    if(!player || player.hp<=0) return;
    var w = getWeapon();
    if(w.type==='single'){
      bullets.push({x:player.x,y:player.y-18,speed:10,dmg:w.dmg,vx:0});
    }else if(w.type==='dual'){
      bullets.push({x:player.x-10,y:player.y-16,speed:10,dmg:w.dmg,vx:0});
      bullets.push({x:player.x+10,y:player.y-16,speed:10,dmg:w.dmg,vx:0});
    }else if(w.type==='spread'){
      for(var a=-0.3;a<=0.3;a+=0.3)
        bullets.push({x:player.x,y:player.y-16,speed:9,dmg:w.dmg,vx:a});
    }else if(w.type==='laser'){
      bullets.push({x:player.x,y:player.y-18,speed:14,dmg:w.dmg,vx:0,life:40});
    }else if(w.type==='barrage'){
      for(var a=-0.6;a<=0.6;a+=0.2)
        bullets.push({x:player.x,y:player.y-16,speed:8,dmg:w.dmg,vx:a});
    }
    Audio.shoot();
  }

  function spawnEnemy(){
    var types = [
      {type:'n',r:16,hp:1,speed:1.2,color:'#ff6b81',score:100},
      {type:'n',r:20,hp:2,speed:0.8,color:'#ffa502',score:200},
      {type:'n',r:14,hp:1,speed:2.2,color:'#ff4757',score:150},
      {type:'k',r:18,hp:1,speed:0.4,color:'#ff6348',score:200},
      {type:'s',r:22,hp:3,speed:0.2,color:'#00d4ff',score:250}
    ];
    var t = types[Math.floor(Math.random()*types.length)];
    if(wave>3&&Math.random()<0.2) t=types[3];
    if(wave>7&&Math.random()<0.15) t=types[4];
    if(wave>5&&Math.random()<0.25) t=types[1];
    enemies.push({
      x:Math.random()*(W-60)+30, y:-30,
      r:t.r, hp:t.hp+(Math.floor(wave/5)), maxHp:t.hp+(Math.floor(wave/5)),
      speed:t.speed+Math.random()*0.5, color:t.color, score:t.score,
      boss:false, bullets:[]
    });
    waveEnemiesLeft--;
  }

  
  function spawnBoss(){
    var bossHp = 30 + wave * 5;
    enemies.push({
      x:W/2, y:-60, r:45, hp:bossHp, maxHp:bossHp,
      speed:0.8, color:'#ff4757', score:2000,
      boss:true, bullets:[],
      state:'enter', stateTimer:0, attackCount:0,
      dir:1, phase:0, warning:0, vx:0, vy:0
    });
  }

  
  function enemyFire(e){
    if(!player || !e.boss) return;
    e.stateTimer = (e.stateTimer||0) + 1;
    e.warning = Math.max(0, (e.warning||0) - 1);
    e.x += (e.vx||0); e.y += (e.vy||0);
    e.x = Math.max(60, Math.min(W-60, e.x));

    if(e.state === 'enter'){
      e.y += 0.8;
      if(e.y >= 90){ e.state='pause'; e.stateTimer=0; }
      return;
    }
    if(e.state === 'pause'){
      e.x += Math.cos(e.stateTimer*0.025)*1.2;
      if(e.stateTimer > 50){
        e.phase = (e.phase+1)%4;
        if(e.phase===0) e.state='aim';
        else if(e.phase===1) e.state='spread';
        else if(e.phase===2) e.state='cross';
        else e.state='charge';
        e.stateTimer=0; e.attackCount=0; e.warning=25;
      }
      return;
    }
    if(e.state === 'aim'){
      e.x += Math.cos(e.stateTimer*0.03)*0.5;
      if(e.stateTimer%10===0 && e.attackCount<5){
        bossAimed(e);
        e.attackCount++;
      }
      if(e.attackCount>=5 && e.stateTimer>60){
        e.state='pause'; e.stateTimer=0;
      }
    }else if(e.state === 'spread'){
      if(e.stateTimer%12===0 && e.attackCount<3){
        bossSpread(e);
        e.attackCount++;
      }
      if(e.attackCount>=3 && e.stateTimer>50){
        e.state='pause'; e.stateTimer=0;
      }
    }else if(e.state === 'cross'){
      if(e.stateTimer%15===0 && e.attackCount<2){
        bossCross(e);
        e.attackCount++;
      }
      if(e.attackCount>=2 && e.stateTimer>40){
        e.state='pause'; e.stateTimer=0;
      }
    }else if(e.state === 'charge'){
      if(e.attackCount===0){
        var a=Math.atan2(player.y-e.y, player.x-e.x);
        e.vx=Math.cos(a)*6; e.vy=Math.sin(a)*6;
        e.attackCount=1;
      }
      if(e.stateTimer>25){
        e.vx=0; e.vy=0;
        if(e.y>90) e.vy=-3;
        else{ e.state='pause'; e.stateTimer=0; e.attackCount=0; }
      }
    }
  }

  function bossAimed(e){
    var a = Math.atan2(player.y-e.y, player.x-e.x);
    e.bullets.push({x:e.x, y:e.y+25, vx:Math.cos(a)*4.5, vy:Math.sin(a)*4.5, sz:4, col:'#ff4757', glow:'#ff6b81'});
    e.bullets.push({x:e.x-12, y:e.y+20, vx:Math.cos(a-0.15)*4, vy:Math.sin(a-0.15)*4, sz:3, col:'#ffa502', glow:'#ffbe76'});
    e.bullets.push({x:e.x+12, y:e.y+20, vx:Math.cos(a+0.15)*4, vy:Math.sin(a+0.15)*4, sz:3, col:'#ffa502', glow:'#ffbe76'});
  }

  function bossSpread(e){
    for(var i=0;i<12;i++){
      var a = i*Math.PI/6 + e.stateTimer*0.05;
      e.bullets.push({x:e.x, y:e.y, vx:Math.cos(a)*3.5, vy:Math.sin(a)*3.5, sz:3, col:'#a855f7', glow:'#c084fc'});
    }
  }

  function bossCross(e){
    var dirs = [0, Math.PI/4, Math.PI/2, 3*Math.PI/4, Math.PI, 5*Math.PI/4, 3*Math.PI/2, 7*Math.PI/4];
    for(var i=0;i<dirs.length;i++){
      e.bullets.push({x:e.x+Math.cos(dirs[i])*20, y:e.y+Math.sin(dirs[i])*20, vx:Math.cos(dirs[i])*3, vy:Math.sin(dirs[i])*3, sz:4, col:'#00d4ff', glow:'#00ff88'});
    }
  }

  function killEnemy(e, bulletIdx){
    score += e.score||100;
    kills++;
    combo++;
    comboTimer = 120;
    var bonus = combo>5?Math.floor(combo/5)*0.5:0;
    score += Math.floor(e.score*bonus);
    spawnParticles(e.x,e.y,10,e.color||'#ff4757',4);
    if(Math.random()<0.15) spawnPowerup(e.x,e.y);
    if(Math.random()<0.05){
      coins += 5;
      Audio.coin();
    }
    UI.updateCoins();
    Audio.explosion();
    if(e.boss){
      coins += 50 + Math.floor(wave/2)*5;
      Audio.coin();
    }
  }

  function hitPlayer(){
    if(!player || player.invuln>0 || shieldActive) return;
    player.hp--;
    player.invuln = 30;
    if(shieldActive) shieldActive = false;
    if(player.hp<=0){
      lives--;
      if(lives<=0){
        gameOver = true;
        endGame();
        return;
      }
      revivePlayer();
    }
  }

  function revivePlayer(){
    player.hp = ships[currentShip].hp;
    player.invuln = 60;
    shieldActive = true;
    setTimeout(function(){shieldActive=false;},2000);
    spawnParticles(player.x,player.y,20,'#00d4ff',5);
  }

  function spawnPowerup(x,y){
    var t = powerupTypes[Math.floor(Math.random()*powerupTypes.length)];
    powerups.push({x:x,y:y,type:t,icon:t.icon,effect:t.effect,dur:t.dur,name:t.name});
  }

  function collectPowerup(p){
    Audio.powerup();
    UI.showNotif('✨ '+p.name+'！','');
    if(p.effect==='weapon'){
      weaponLevel = Math.min(weapons.length-1, weaponLevel+1);
      setTimeout(function(){
        weaponLevel = Math.max(0,weaponLevel-1);
        UI.showNotif('💫 火力恢复','');
      },5000);
    }else if(p.effect==='shield'){
      shieldActive = true;
      setTimeout(function(){shieldActive=false;},5000);
    }else if(p.effect==='life'){
      lives = Math.min(maxLives, lives+1);
    }else if(p.effect==='speed'){
      if(player) player.speed *= 1.5;
      setTimeout(function(){if(player) player.speed = ships[currentShip].speed;},3000);
    }else if(p.effect==='coin'){
      coins += 10;
      UI.updateCoins();
      Audio.coin();
    }

  function spawnParticles(x,y,n,color,speed){

      var a = Math.random()*Math.PI*2;

      particles.push({
        x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
        life:20+Math.random()*20,color:color,size:2+Math.random()*3
      });
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // background gradient
    var g = ctx.createRadialGradient(W/2,H/2,W*0.5,W/2,H/2,W);
    g.addColorStop(0,'#0a0a2e');
    g.addColorStop(1,'#050518');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
    // stars
    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      ctx.fillStyle='rgba(255,255,255,'+s.b+')';
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fill();
      s.y+=s.s*(S.control==='mouse'?0.3:0.5);
      if(s.y>H){ s.y=0; s.x=Math.random()*W; }
    }
    // powerups
    for(var i=0;i<powerups.length;i++){
      var p=powerups[i];
      ctx.fillStyle='rgba(255,255,255,0.15)';
      ctx.beginPath();
      ctx.arc(p.x,p.y,14,0,Math.PI*2);
      ctx.fill();
      ctx.font='16px sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillStyle='#fff';
      ctx.fillText(p.icon,p.x,p.y+1);
    }
    // enemies
    for(var i=0;i<enemies.length;i++){
      var e=enemies[i];
      if(e.hp<=0) continue;
      ctx.shadowColor = e.color;
      ctx.shadowBlur = e.boss?20:8;
      ctx.fillStyle = e.color;
      if(e.boss){
        // boss ship
        ctx.beginPath();
        ctx.moveTo(e.x,e.y-30);
        ctx.lineTo(e.x-30,e.y+10);
        ctx.lineTo(e.x-20,e.y+35);
        ctx.lineTo(e.x,e.y+25);
        ctx.lineTo(e.x+20,e.y+35);
        ctx.lineTo(e.x+30,e.y+10);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.2)';
        ctx.beginPath();
        ctx.arc(e.x,e.y+5,12,0,Math.PI*2);
        ctx.fill();
      }else{
        // small enemy
        ctx.beginPath();
        ctx.moveTo(e.x,e.y+15);
        ctx.lineTo(e.x-12,e.y-8);
        ctx.lineTo(e.x-6,e.y-15);
        ctx.lineTo(e.x,e.y-8);
        ctx.lineTo(e.x+6,e.y-15);
        ctx.lineTo(e.x+12,e.y-8);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(e.x,e.y,4,0,Math.PI*2);
        ctx.fill();
      }
      // enemy bullets
      if(e.bullets){
        for(var k=0;k<e.bullets.length;k++){
          var eb=e.bullets[k];
          ctx.shadowColor=eb.col||'#ff4757';
          ctx.shadowBlur=eb.glow?15:6;
          ctx.fillStyle=eb.col||'#ff4757';
          ctx.beginPath();
          ctx.arc(eb.x,eb.y,eb.sz||4,0,Math.PI*2);
          ctx.fill();
          if(eb.glow){
            ctx.shadowBlur=25;
            ctx.globalAlpha=0.25;
            ctx.beginPath();
            ctx.arc(eb.x,eb.y,(eb.sz||4)*2,0,Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
          }
        }
      }
      ctx.shadowBlur = 0;
    }
    // bullets
    for(var i=0;i<bullets.length;i++){
      var b2=bullets[i];
      ctx.shadowColor = '#00d4ff';
      ctx.shadowBlur = 12;
      var grad = ctx.createLinearGradient(b2.x-3,b2.y-8,b2.x+3,b2.y+8);
      grad.addColorStop(0,'#00d4ff');
      grad.addColorStop(1,'#7b2ff7');
      ctx.fillStyle = grad;
      ctx.fillRect(b2.x-3,b2.y-8,6,14);
      ctx.shadowBlur = 0;
    }
    // particles
    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      var alpha = p.life/40;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color||'#ff4757';
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);
      ctx.fill();
    }
    if(shakeIntensity>0.5){ctx.save();ctx.translate((Math.random()-0.5)*shakeIntensity,(Math.random()-0.5)*shakeIntensity);}
    ctx.globalAlpha = 1;
    // player
    if(player && player.hp>0){
      ctx.shadowColor = shieldActive?'#00ff88':'#00d4ff';
      ctx.shadowBlur = shieldActive?25:15;
      var px = player.x, py = player.y;
      var col = ships[currentShip].color;
      // ship body
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.moveTo(px,py-22);
      ctx.lineTo(px-16,py+10);
      ctx.lineTo(px-10,py+18);
      ctx.lineTo(px,py+12);
      ctx.lineTo(px+10,py+18);
      ctx.lineTo(px+16,py+10);
      ctx.closePath();
      ctx.fill();
      // cockpit
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.arc(px,py-6,6,0,Math.PI*2);
      ctx.fill();
      // engine glow
      ctx.shadowBlur = 0;
      var glw = ctx.createRadialGradient(px,py+16,2,px,py+16,10);
      glw.addColorStop(0,'rgba(0,212,255,0.6)');
      glw.addColorStop(1,'rgba(0,212,255,0)');
      ctx.fillStyle = glw;
      ctx.beginPath();
      ctx.arc(px,py+16,10,0,Math.PI*2);
      ctx.fill();
      // shield
      if(shieldActive){
        ctx.strokeStyle='rgba(0,255,136,0.3)';
        ctx.lineWidth=2;
        ctx.shadowBlur=15;
        ctx.shadowColor='#00ff88';
        ctx.beginPath();
        ctx.arc(px,py,28,0,Math.PI*2);
        ctx.stroke();
      }
      // invuln flash
      if(player.invuln>0 && player.invuln%4<2){
        ctx.globalAlpha = 0.5;
      }
      ctx.shadowBlur = 0;
    }
    // floating text draw
    for(var fti=0;fti<floatingTexts.length;fti++){
      var ft=floatingTexts[fti];
      ctx.globalAlpha=ft.life/40;
      ctx.fillStyle=ft.col||"#fff";
      ctx.font="bold 16px sans-serif";
      ctx.textAlign="center";
      ctx.shadowColor=ft.col||"#fff";
      ctx.shadowBlur=8;
      ctx.fillText(ft.text,ft.x,ft.y);
      ctx.shadowBlur=0;
    }
    ctx.globalAlpha=1;
    // combo display
    if(combo>5){
      ctx.fillStyle='rgba(255,215,0,0.8)';
      ctx.font='bold 20px sans-serif';
      ctx.textAlign='center';
      ctx.fillText('🔥 '+combo+' 连击!',W/2,60);
    }
  }

  // storage
  function save(){
    try{
      var d = {
        coins:coins, highScore:highScore, maxWave:maxWave,
        totalCoins:totalCoins, ks100:kills,
        ownedShips:ownedShips, ownedWeapons:ownedWeapons,
        dailyCollected:dailyCollected
      };
      localStorage.setItem('starbattle',JSON.stringify(d));
    }catch(e){}
  }
  function load(){
    try{
      var d = JSON.parse(localStorage.getItem('starbattle'));
      if(d){
        coins = d.coins||0; highScore = d.highScore||0;
        maxWave = d.maxWave||0; totalCoins = d.totalCoins||0;
        ks100 = d.ks100||0; ownedShips = d.ownedShips||[0];
        ownedWeapons = d.ownedWeapons||[0];
        dailyCollected = d.dailyCollected||false;
      }
    }catch(e){}
    // moved to init()
  }
  function checkDaily(){
    try{
      var last = localStorage.getItem('starbattle_daily');
      if(last){
        var today = new Date().toDateString();
        if(last===today){ dailyCollected=true; return; }
      }
      dailyCollected=false;
      setTimeout(function(){UI.showDaily();},500);
    }catch(e){}
  }
  function collectDaily(){
    dailyCollected=true;
    var amt = 50;
    coins+=amt; totalCoins+=amt;
    try{ localStorage.setItem('starbattle_daily',new Date().toDateString()); }catch(e){}
    save();
    UI.updateCoins();
    UI.hideDaily();
    Audio.coin();
    UI.showNotif('🎁 +50 🪙 每日奖励','');
  }

  return {
    init: init, startGame: startGame, togglePause: togglePause, quit: quit,
    getWave: function(){return wave;},
    getScore: function(){return score;},
    getKills: function(){return kills;},
    getLives: function(){return lives;},
    getCombo: function(){return combo;},
    getCoins: function(){return coins;},
    setCoins: function(v){coins=v;},
    getHighScore: function(){return highScore;},
    getMaxWave: function(){return maxWave;},
    getTotalCoins: function(){return totalCoins;},
    getShips: function(){return ships;},
    getWeapons: function(){return weapons;},
    getCurrentShip: function(){return currentShip;},
    setCurrentShip: function(v){currentShip=v;},
    getOwnedShips: function(){return ownedShips;},
    getOwnedWeapons: function(){return ownedWeapons;},
    getAchievements: function(){return achievements;},
    getDailyCollected: function(){return dailyCollected;},
    setDailyCollected: function(v){dailyCollected=v;},
    collectDaily: collectDaily,
    save: save,
    // for leaderboard
    leaderboard: [],
    addToLeaderboard: function(name,score,wave){
      this.leaderboard.push({name:name||'玩家',score:score,wave:wave});
      this.leaderboard.sort(function(a,b){return b.score-a.score;});
      if(this.leaderboard.length>10) this.leaderboard.length=10;
      try{ localStorage.setItem('starbattle_lb',JSON.stringify(this.leaderboard)); }catch(e){}
    },
    loadLeaderboard: function(){
      try{
        var d = JSON.parse(localStorage.getItem('starbattle_lb'));
        if(d) this.leaderboard = d;
      }catch(e){}
    },
    fill: function(){},
    coins: function(){return coins;}
  };
})();

var Audio = (function(){
  var ctx = null;
  function getCtx(){ if(!ctx) try{ ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} return ctx; }
  function playTone(f,d,t,v){
    var c = getCtx(); if(!c || !S.sfx) return;
    var o = c.createOscillator();
    var g = c.createGain();
    o.type = t||"square";
    o.frequency.value = f;
    g.gain.setValueAtTime((v||0.15)*0.5, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime + d);
  }
  function noise(d,v){
    var c = getCtx(); if(!c || !S.sfx) return;
    var b = c.createBuffer(1, c.sampleRate*d, c.sampleRate);
    var ch = b.getChannelData(0);
    for(var i=0;i<ch.length;i++) ch[i]=Math.random()*2-1;
    var s = c.createBufferSource();
    s.buffer = b;
    var g = c.createGain();
    g.gain.setValueAtTime((v||0.08), c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+d);
    s.connect(g); g.connect(c.destination);
    s.start();
  }
  return {
    shoot: function(){ playTone(800,0.08,"square",0.1); },
    explosion: function(){ noise(0.3,0.12); playTone(100,0.2,"sawtooth",0.15); },
    powerup: function(){ playTone(600,0.1,"sine",0.12); setTimeout(function(){playTone(900,0.15,"sine",0.12);},100); },
    hit: function(){ playTone(300,0.06,"square",0.08); },
    bossWarning: function(){ playTone(200,0.3,"square",0.1); setTimeout(function(){playTone(250,0.3,"square",0.1);},400); },
    gameOver: function(){ playTone(400,0.15,"sawtooth",0.1); setTimeout(function(){playTone(300,0.15,"sawtooth",0.1);},200); setTimeout(function(){playTone(200,0.3,"sawtooth",0.1);},400); },
    click: function(){ playTone(1000,0.04,"sine",0.06); },
    coin: function(){ playTone(1200,0.06,"sine",0.1); setTimeout(function(){playTone(1500,0.08,"sine",0.1);},80); }
  };
})();

var Game = (function(){

    {name:'双发',desc:'双发并行',price:300,dmg:1,rate:10,type:'dual'},
    {name:'散射',desc:'三发散弹',price:800,dmg:1.2,rate:14,type:'spread'},

    {name:'双倍火力',icon:'🔥',effect:'weapon',dur:5000},
    {name:'护盾',icon:'🛡️',effect:'shield',dur:5000},

  ];
  var achievements = [
    {id:'first',name:'初次飞行',desc:'完成第一局游戏',icon:'🚀',check:function(){return true;}},

    {id:'wave10',name:'太空老兵',desc:'到达第10波',icon:'⭐',check:function(){return maxWave>=10;}},
    {id:'wave20',name:'星际战神',desc:'到达第20波',icon:'🌟',check:function(){return maxWave>=20;}},
    {id:'score5k',name:'高分猎手',desc:'单局得分5000',icon:'🎯',check:function(){return highScore>=5000;}},
    {id:'score10k',name:'传奇机长',desc:'单局得分10000',icon:'🏅',check:function(){return highScore>=10000;}},
    {id:'collector',name:'收藏家',desc:'购买3架战机',icon:'🛒',check:function(){return ownedShips.length>=3;}},
    {id:'rich',name:'百万富翁',desc:'累计获得5000金币',icon:'💰',check:function(){return totalCoins>=5000;}}
  ];
  var highScore=0, maxWave=0, ks100=0, totalCoins=0;
  var dailyCollected=false;

  function init(){
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);
    load();
    initStars();
    initInput();
    UI.updateCoins();

  }
  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  function initStars(){
    stars = [];
    for(var i=0;i<120;i++){
      stars.push({
        x:Math.random()*W, y:Math.random()*H,
        r:Math.random()*2+0.5, s:Math.random()*2+0.5,
        b:Math.random()*0.6+0.4
      });
    }
  }
  function initInput(){
    canvas.addEventListener('mousemove',function(e){
      mouseX=e.clientX; mouseY=e.clientY;
    });
    canvas.addEventListener('touchmove',function(e){
      e.preventDefault();
      var t=e.touches[0];
      mouseX=t.clientX; mouseY=t.clientY;
    },{passive:false});
    canvas.addEventListener('touchstart',function(e){
      e.preventDefault();
      var t=e.touches[0];
      mouseX=t.clientX; mouseY=t.clientY;
    },{passive:false});
    document.addEventListener('keydown',function(e){
      keys[e.key]=true;
      if(e.key===' '||e.key==='Escape') e.preventDefault();
    });
    document.addEventListener('keyup',function(e){ keys[e.key]=false; });
  }

  function startGame(){
    document.getElementById('goScreen')&&document.getElementById('goScreen').classList.remove('active');
    document.getElementById('achvScreen')&&document.getElementById('achvScreen').classList.remove('active');
    document.getElementById('lbScreen')&&document.getElementById('lbScreen').classList.remove('active');
    document.getElementById('dailyScreen')&&document.getElementById('dailyScreen').classList.remove('active');
    document.getElementById('shopScreen')&&document.getElementById('shopScreen').classList.remove('active');
    document.getElementById('settingsScreen')&&document.getElementById('settingsScreen').classList.remove('active');
    player = {x:W/2,y:H-80,w:30,h:36,hp:ships[currentShip].hp,maxHp:ships[currentShip].hp,speed:ships[currentShip].speed,invuln:0};
    bullets = []; enemies = []; particles = []; powerups = [];
    score = 0; kills = 0; wave = 1; lives = 3; combo = 0; comboTimer = 0;
    waveEnemiesLeft = 5; bossActive = false; spawnTimer = 0; weaponLevel = 0;
    shieldActive = false; gameOver = false; running = true; paused = false;
    UI.showHud();
    Audio.click();
  }

  function loop(){
    if(!running && !gameOver) { frameId = requestAnimationFrame(loop); return; }
    if(!paused && running) update();
    draw();
    frameId = requestAnimationFrame(loop);
  }

  function getWeapon(){ return weapons[weaponLevel]||weapons[0]; }

  function update(){
    // boss warning flash
    for(var i=0;i<enemies.length;i++){
      var e=enemies[i];
      if(e.boss && e.warning>0 && e.warning%4<2){
        ctx.fillStyle='rgba(255,0,50,0.08)';
        ctx.fillRect(0,0,W,H);
      }
    }
    // player movement
    if(player){
      var spd = player.speed * (keys['Shift']?1.6:1);
      if(keys['ArrowLeft']||keys['a']) player.x -= spd;
      if(keys['ArrowRight']||keys['d']) player.x += spd;
      if(keys['ArrowUp']||keys['w']) player.y -= spd;
      if(keys['ArrowDown']||keys['s']) player.y += spd;
      // mouse follow in mouse mode
      if(S.control==='mouse'){
        var dx = mouseX - player.x, dy = mouseY - player.y;
        var dist = Math.sqrt(dx*dx+dy*dy);
        if(dist>2){
          player.x += (dx/dist)*Math.min(spd*1.5,dist);
          player.y += (dy/dist)*Math.min(spd*1.5,dist);
        }
      }
      player.x = Math.max(20,Math.min(W-20,player.x));
      player.y = Math.max(40,Math.min(H-40,player.y));
      if(player.invuln>0) player.invuln--;
    }
    // auto fire
    if(player && running){
      timer++;
      if(timer%(getWeapon().rate||12)===0){
        fire();
      }
    }
    // update bullets
    for(var i=bullets.length-1;i>=0;i--){
      var b2=bullets[i];
      b2.y-=b2.speed||8;
      b2.x+=b2.vx||0;
      if(b2.life) b2.life--;
      if(b2.y<-20||b2.y>H+20||b2.x<-20||b2.x>W+20||(b2.life!==undefined&&b2.life<=0)){
        bullets.splice(i,1); continue;
      }
      // enemy collision
      for(var j=enemies.length-1;j>=0;j--){
        var e=enemies[j];
        if(e.hp<=0) continue;
        var dx=b2.x-e.x, dy=b2.y-e.y;
        if(Math.sqrt(dx*dx+dy*dy)<(e.r||18)+6){
          e.hp-=b2.dmg||1;
          spawnParticles(e.x,e.y,3,e.color||'#ff4757',2);
          Audio.hit();
          if(e.hp<=0){
            killEnemy(e,i);
          }
          bullets.splice(i,1);
          break;
        }
      }
    }
    // update enemies
    for(var i=enemies.length-1;i>=0;i--){
      var e=enemies[i];
      if(e.hp<=0){ enemies.splice(i,1); continue; }
      if(e.boss){ enemyFire(e); }
      // move towards player
      var angle = Math.atan2(player.y-e.y, player.x-e.x);
      if(e.boss){
        e.x+=Math.cos(angle)*0.8;
        e.y+=Math.sin(angle)*0.3;
        e.x=Math.max(80,Math.min(W-80,e.x));
      }else{
        e.x+=Math.cos(angle)*(e.speed||1.5);
        e.y+=Math.sin(angle)*(e.speed||1.5);
      }
      // enemy bullet collision with player
      if(e.bullets){
        for(var k=e.bullets.length-1;k>=0;k--){
          var eb=e.bullets[k];
          eb.x+=eb.vx||0; eb.y+=eb.vy||0;
          if(eb.y>H||eb.y<-20||eb.x<-20||eb.x>W+20){ e.bullets.splice(k,1); continue; }
          if(player && player.hp>0){
            var ddx=eb.x-player.x, ddy=eb.y-player.y;
            var r=(eb.sz||3)+16;
            if(Math.sqrt(ddx*ddx+ddy*ddy)<r){
              hitPlayer();
              e.bullets.splice(k,1);
            }
          }
        }
      }
      // player collision
      if(player && player.hp>0){
        var dx=player.x-e.x, dy=player.y-e.y;
        if(Math.sqrt(dx*dx+dy*dy)<(e.r||18)+18){
          if(!e.boss || true){
            if(e.hp>0){
              e.hp=0;
              killEnemy(e);
              hitPlayer();
            }
          }
        }
      }
      // off-screen cleanup
      if(e.y>H+50 || e.x<-50 || e.x>W+50){
        if(!e.boss) enemies.splice(i,1);
      }
    }
    // powerups
    for(var i=powerups.length-1;i>=0;i--){
      var p=powerups[i];
      p.y+=1.5;
      if(p.y>H+20){ powerups.splice(i,1); continue; }
      if(player && player.hp>0){
        var dx = p.x-player.x, dy = p.y-player.y;
        if(Math.sqrt(dx*dx+dy*dy)<24){
          collectPowerup(p);
          powerups.splice(i,1);
        }
      }
    }
    // particles
    for(var i=particles.length-1;i>=0;i--){
      var p=particles[i];
      p.x+=p.vx; p.y+=p.vy;
      p.vy+=0.05;
      p.life--;
      if(p.life<=0) particles.splice(i,1);
    }
    // combo timer
    if(comboTimer>0) comboTimer--;
    else combo=0;
    // spawning
    if(!bossActive){
      spawnTimer++;
      var spawnRate = Math.max(15,60-wave*2);
      if(spawnTimer>=spawnRate && waveEnemiesLeft>0){
        spawnEnemy();
        spawnTimer=0;
      }
    }
    // wave progression
    if(!bossActive && waveEnemiesLeft<=0 && enemies.length===0){
      if(wave%5===0){
        bossActive = true;
        spawnBoss();
        Audio.bossWarning();
        document.getElementById('bossBar').style.display = 'block';
        UI.showNotif('⚠️ BOSS 来袭！','danger');
      }else{
        wave++;
        waveEnemiesLeft = 5+wave*2;
        UI.showNotif('⚔️ 第 '+wave+' 波','');
        Audio.click();
      }
    }
    // boss check
    if(bossActive){
      var hasBoss = false;
      for(var i=0;i<enemies.length;i++){
        if(enemies[i].boss){ hasBoss=true;
          document.getElementById('bossFill').style.width = Math.max(0,enemies[i].hp/enemies[i].maxHp*100)+'%'; break; }
      }
      if(!hasBoss){ bossActive=false;
        document.getElementById('bossBar').style.display = 'none';
        wave++;
        waveEnemiesLeft = 5+wave*2;
        Audio.coin();
        coins+=50;
        UI.updateCoins();
        UI.showNotif('🎉 BOSS 击败！+50 🪙','');
      }
    }
    // update HUD
    document.getElementById('scoreDisp').textContent = score;
    document.getElementById('hudCoins').textContent = coins;
    document.getElementById('waveDisp').textContent = wave;
    var h = '';
    for(var i=0;i<lives;i++) h+='❤️';
    document.getElementById('livesDisp').textContent = h||'💀';
    document.getElementById('weaponDisp').textContent = '🔫 '+weaponNames[weaponLevel];
  }
  var timer=0;

  function fire(){
    if(!player || player.hp<=0) return;
    var w = getWeapon();
    if(w.type==='single'){
      bullets.push({x:player.x,y:player.y-18,speed:10,dmg:w.dmg,vx:0});
    }else if(w.type==='dual'){
      bullets.push({x:player.x-10,y:player.y-16,speed:10,dmg:w.dmg,vx:0});
      bullets.push({x:player.x+10,y:player.y-16,speed:10,dmg:w.dmg,vx:0});
    }else if(w.type==='spread'){
      for(var a=-0.3;a<=0.3;a+=0.3)
        bullets.push({x:player.x,y:player.y-16,speed:9,dmg:w.dmg,vx:a});
    }else if(w.type==='laser'){
      bullets.push({x:player.x,y:player.y-18,speed:14,dmg:w.dmg,vx:0,life:40});
    }else if(w.type==='barrage'){
      for(var a=-0.6;a<=0.6;a+=0.2)
        bullets.push({x:player.x,y:player.y-16,speed:8,dmg:w.dmg,vx:a});
    }
    Audio.shoot();
  }

  function spawnEnemy(){
    var types = [
      {r:16,hp:1,speed:1.2,color:'#ff6b81',score:100},
      {r:20,hp:2,speed:0.8,color:'#ffa502',score:200},
      {r:14,hp:1,speed:2,color:'#ff4757',score:150}
    ];
    var t = types[Math.floor(Math.random()*types.length)];
    if(wave>5 && Math.random()<0.3) t = types[1];
    if(wave>10 && Math.random()<0.2) t = types[2];
    enemies.push({
      x:Math.random()*(W-60)+30, y:-30,
      r:t.r, hp:t.hp+(Math.floor(wave/5)), maxHp:t.hp+(Math.floor(wave/5)),
      speed:t.speed+Math.random()*0.5, color:t.color, score:t.score,
      boss:false, bullets:[]
    });
    waveEnemiesLeft--;
  }

  
  function spawnBoss(){
    var bossHp = 30 + wave * 5;
    enemies.push({
      x:W/2, y:-60, r:45, hp:bossHp, maxHp:bossHp,
      speed:0.8, color:'#ff4757', score:2000,
      boss:true, bullets:[],
      state:'enter', stateTimer:0, attackCount:0,
      dir:1, phase:0, warning:0, vx:0, vy:0
    });
  }

  
  function enemyFire(e){
    if(!player || !e.boss) return;
    e.stateTimer = (e.stateTimer||0) + 1;
    e.warning = Math.max(0, (e.warning||0) - 1);
    e.x += (e.vx||0); e.y += (e.vy||0);
    e.x = Math.max(60, Math.min(W-60, e.x));

    if(e.state === 'enter'){
      e.y += 0.8;
      if(e.y >= 90){ e.state='pause'; e.stateTimer=0; }
      return;
    }
    if(e.state === 'pause'){
      e.x += Math.cos(e.stateTimer*0.025)*1.2;
      if(e.stateTimer > 50){
        e.phase = (e.phase+1)%4;
        if(e.phase===0) e.state='aim';
        else if(e.phase===1) e.state='spread';
        else if(e.phase===2) e.state='cross';
        else e.state='charge';
        e.stateTimer=0; e.attackCount=0; e.warning=25;
      }
      return;
    }
    if(e.state === 'aim'){
      e.x += Math.cos(e.stateTimer*0.03)*0.5;
      if(e.stateTimer%10===0 && e.attackCount<5){
        bossAimed(e);
        e.attackCount++;
      }
      if(e.attackCount>=5 && e.stateTimer>60){
        e.state='pause'; e.stateTimer=0;
      }
    }else if(e.state === 'spread'){
      if(e.stateTimer%12===0 && e.attackCount<3){
        bossSpread(e);
        e.attackCount++;
      }
      if(e.attackCount>=3 && e.stateTimer>50){
        e.state='pause'; e.stateTimer=0;
      }
    }else if(e.state === 'cross'){
      if(e.stateTimer%15===0 && e.attackCount<2){
        bossCross(e);
        e.attackCount++;
      }
      if(e.attackCount>=2 && e.stateTimer>40){
        e.state='pause'; e.stateTimer=0;
      }
    }else if(e.state === 'charge'){
      if(e.attackCount===0){
        var a=Math.atan2(player.y-e.y, player.x-e.x);
        e.vx=Math.cos(a)*6; e.vy=Math.sin(a)*6;
        e.attackCount=1;
      }
      if(e.stateTimer>25){
        e.vx=0; e.vy=0;
        if(e.y>90) e.vy=-3;
        else{ e.state='pause'; e.stateTimer=0; e.attackCount=0; }
      }
    }
  }

  function bossAimed(e){
    var a = Math.atan2(player.y-e.y, player.x-e.x);
    e.bullets.push({x:e.x, y:e.y+25, vx:Math.cos(a)*4.5, vy:Math.sin(a)*4.5, sz:4, col:'#ff4757', glow:'#ff6b81'});
    e.bullets.push({x:e.x-12, y:e.y+20, vx:Math.cos(a-0.15)*4, vy:Math.sin(a-0.15)*4, sz:3, col:'#ffa502', glow:'#ffbe76'});
    e.bullets.push({x:e.x+12, y:e.y+20, vx:Math.cos(a+0.15)*4, vy:Math.sin(a+0.15)*4, sz:3, col:'#ffa502', glow:'#ffbe76'});
  }

  function bossSpread(e){
    for(var i=0;i<12;i++){
      var a = i*Math.PI/6 + e.stateTimer*0.05;
      e.bullets.push({x:e.x, y:e.y, vx:Math.cos(a)*3.5, vy:Math.sin(a)*3.5, sz:3, col:'#a855f7', glow:'#c084fc'});
    }
  }

  function bossCross(e){
    var dirs = [0, Math.PI/4, Math.PI/2, 3*Math.PI/4, Math.PI, 5*Math.PI/4, 3*Math.PI/2, 7*Math.PI/4];
    for(var i=0;i<dirs.length;i++){
      e.bullets.push({x:e.x+Math.cos(dirs[i])*20, y:e.y+Math.sin(dirs[i])*20, vx:Math.cos(dirs[i])*3, vy:Math.sin(dirs[i])*3, sz:4, col:'#00d4ff', glow:'#00ff88'});
    }
  }

  function killEnemy(e, bulletIdx){
    score += e.score||100;
    kills++;
    combo++;
    comboTimer = 120;
    var bonus = combo>5?Math.floor(combo/5)*0.5:0;
    score += Math.floor(e.score*bonus);
    spawnParticles(e.x,e.y,10,e.color||'#ff4757',4);
    if(Math.random()<0.15) spawnPowerup(e.x,e.y);
    if(Math.random()<0.05){
      coins += 5;
      Audio.coin();
    }
    UI.updateCoins();
    Audio.explosion();
    if(e.boss){
      coins += 50 + Math.floor(wave/2)*5;
      Audio.coin();
    }
  }

  function hitPlayer(){
    if(!player || player.invuln>0 || shieldActive) return;
    player.hp--;
    player.invuln = 30;
    if(shieldActive) shieldActive = false;
    if(player.hp<=0){
      lives--;
      if(lives<=0){
        gameOver = true;
        endGame();
        return;
      }
      revivePlayer();
    }
  }

  function revivePlayer(){
    player.hp = ships[currentShip].hp;
    player.invuln = 60;
    shieldActive = true;
    setTimeout(function(){shieldActive=false;},2000);
    spawnParticles(player.x,player.y,20,'#00d4ff',5);
  }

  function spawnPowerup(x,y){
    var t = powerupTypes[Math.floor(Math.random()*powerupTypes.length)];
    powerups.push({x:x,y:y,type:t,icon:t.icon,effect:t.effect,dur:t.dur,name:t.name});
  }

  function collectPowerup(p){
    Audio.powerup();
    UI.showNotif('✨ '+p.name+'！','');
    if(p.effect==='weapon'){
      weaponLevel = Math.min(weapons.length-1, weaponLevel+1);
      setTimeout(function(){
        weaponLevel = Math.max(0,weaponLevel-1);
        UI.showNotif('💫 火力恢复','');
      },5000);
    }else if(p.effect==='shield'){
      shieldActive = true;
      setTimeout(function(){shieldActive=false;},5000);
    }else if(p.effect==='life'){
      lives = Math.min(maxLives, lives+1);
    }else if(p.effect==='speed'){
      if(player) player.speed *= 1.5;
      setTimeout(function(){if(player) player.speed = ships[currentShip].speed;},3000);
    }else if(p.effect==='coin'){
      coins += 10;
      UI.updateCoins();
      Audio.coin();
    }
  }

  function spawnParticles(x,y,n,color,speed){
    for(var i=0;i<n;i++){
      var a = Math.random()*Math.PI*2;
      var sp = Math.random()*speed+1;
      particles.push({
        x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
        life:20+Math.random()*20,color:color,size:2+Math.random()*3
      });
    }
  }

  function endGame(){
    running = false;
    Game.addToLeaderboard&&Game.addToLeaderboard('玩家',score,wave);
    var coinReward = Math.floor(score/100) + kills + wave*2;
    coins += coinReward;
    totalCoins += coinReward;
    if(score>highScore) highScore=score;
    if(wave>maxWave) maxWave=wave;
    save();
    document.getElementById('fScore').textContent = score;
    document.getElementById('fKills').textContent = kills;
    document.getElementById('fWave').textContent = wave;
    document.getElementById('fCoins').textContent = '+'+coinReward+' 🪙';
    document.getElementById('reviveBtn').style.display = lives<=0?'block':'none';
    document.getElementById('doubleBtn').style.display = 'block';
    Audio.gameOver();
    UI.showGameOver();
  }

  function togglePause(){
    paused = !paused;
    document.getElementById('pauseScreen').classList.toggle('active',paused);
    document.getElementById('pauseBtn').textContent = paused?'▶':'⏸';
  }

  function quit(){
    running = false; gameOver = false;
    document.getElementById('pauseScreen').classList.remove('active');
    document.getElementById('gameHud').style.display = 'none';
    document.getElementById('pauseBtn').style.display = 'none';
    document.getElementById('bossBar').style.display = 'none';
    UI.showMenu();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // background gradient
    var g = ctx.createRadialGradient(W/2,H/2,W*0.5,W/2,H/2,W);
    g.addColorStop(0,'#0a0a2e');
    g.addColorStop(1,'#050518');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
    // stars
    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      ctx.fillStyle='rgba(255,255,255,'+s.b+')';
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fill();
      s.y+=s.s*(S.control==='mouse'?0.3:0.5);
      if(s.y>H){ s.y=0; s.x=Math.random()*W; }
    }
    // powerups
    for(var i=0;i<powerups.length;i++){
      var p=powerups[i];
      ctx.fillStyle='rgba(255,255,255,0.15)';
      ctx.beginPath();
      ctx.arc(p.x,p.y,14,0,Math.PI*2);
      ctx.fill();
      ctx.font='16px sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillStyle='#fff';
      ctx.fillText(p.icon,p.x,p.y+1);
    }
    // enemies
    for(var i=0;i<enemies.length;i++){
      var e=enemies[i];
      if(e.hp<=0) continue;
      ctx.shadowColor = e.color;
      ctx.shadowBlur = e.boss?20:8;
      ctx.fillStyle = e.color;
      if(e.boss){
        // boss ship
        ctx.beginPath();
        ctx.moveTo(e.x,e.y-30);
        ctx.lineTo(e.x-30,e.y+10);
        ctx.lineTo(e.x-20,e.y+35);
        ctx.lineTo(e.x,e.y+25);
        ctx.lineTo(e.x+20,e.y+35);
        ctx.lineTo(e.x+30,e.y+10);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.2)';
        ctx.beginPath();
        ctx.arc(e.x,e.y+5,12,0,Math.PI*2);
        ctx.fill();
      }else{
        // small enemy
        ctx.beginPath();
        ctx.moveTo(e.x,e.y+15);
        ctx.lineTo(e.x-12,e.y-8);
        ctx.lineTo(e.x-6,e.y-15);
        ctx.lineTo(e.x,e.y-8);
        ctx.lineTo(e.x+6,e.y-15);
        ctx.lineTo(e.x+12,e.y-8);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(e.x,e.y,4,0,Math.PI*2);
        ctx.fill();
      }
      // enemy bullets
      if(e.bullets){
        for(var k=0;k<e.bullets.length;k++){
          var eb=e.bullets[k];
          ctx.shadowColor=eb.col||'#ff4757';
          ctx.shadowBlur=eb.glow?15:6;
          ctx.fillStyle=eb.col||'#ff4757';
          ctx.beginPath();
          ctx.arc(eb.x,eb.y,eb.sz||4,0,Math.PI*2);
          ctx.fill();
          if(eb.glow){
            ctx.shadowBlur=25;
            ctx.globalAlpha=0.25;
            ctx.beginPath();
            ctx.arc(eb.x,eb.y,(eb.sz||4)*2,0,Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
          }
        }
      }
      ctx.shadowBlur = 0;
    }
    // bullets
    for(var i=0;i<bullets.length;i++){
      var b2=bullets[i];
      ctx.shadowColor = '#00d4ff';
      ctx.shadowBlur = 12;
      var grad = ctx.createLinearGradient(b2.x-3,b2.y-8,b2.x+3,b2.y+8);
      grad.addColorStop(0,'#00d4ff');
      grad.addColorStop(1,'#7b2ff7');
      ctx.fillStyle = grad;
      ctx.fillRect(b2.x-3,b2.y-8,6,14);
      ctx.shadowBlur = 0;
    }
    // particles
    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      var alpha = p.life/40;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color||'#ff4757';
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    // player
    if(player && player.hp>0){
      ctx.shadowColor = shieldActive?'#00ff88':'#00d4ff';
      ctx.shadowBlur = shieldActive?25:15;
      var px = player.x, py = player.y;
      var col = ships[currentShip].color;
      // ship body
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.moveTo(px,py-22);
      ctx.lineTo(px-16,py+10);
      ctx.lineTo(px-10,py+18);
      ctx.lineTo(px,py+12);
      ctx.lineTo(px+10,py+18);
      ctx.lineTo(px+16,py+10);
      ctx.closePath();
      ctx.fill();
      // cockpit
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.arc(px,py-6,6,0,Math.PI*2);
      ctx.fill();
      // engine glow
      ctx.shadowBlur = 0;
      var glw = ctx.createRadialGradient(px,py+16,2,px,py+16,10);
      glw.addColorStop(0,'rgba(0,212,255,0.6)');
      glw.addColorStop(1,'rgba(0,212,255,0)');
      ctx.fillStyle = glw;
      ctx.beginPath();
      ctx.arc(px,py+16,10,0,Math.PI*2);
      ctx.fill();
      // shield
      if(shieldActive){
        ctx.strokeStyle='rgba(0,255,136,0.3)';
        ctx.lineWidth=2;
        ctx.shadowBlur=15;
        ctx.shadowColor='#00ff88';
        ctx.beginPath();
        ctx.arc(px,py,28,0,Math.PI*2);
        ctx.stroke();
      }
      // invuln flash
      if(player.invuln>0 && player.invuln%4<2){
        ctx.globalAlpha = 0.5;
      }
      ctx.shadowBlur = 0;
    }
    // combo display
    if(combo>5){
      ctx.fillStyle='rgba(255,215,0,0.8)';
      ctx.font='bold 20px sans-serif';
      ctx.textAlign='center';
      ctx.fillText('🔥 '+combo+' 连击!',W/2,60);
    }
  }

  // storage
  function save(){
    try{
      var d = {
        coins:coins, highScore:highScore, maxWave:maxWave,
        totalCoins:totalCoins, ks100:kills,
        ownedShips:ownedShips, ownedWeapons:ownedWeapons,
        dailyCollected:dailyCollected
      };
      localStorage.setItem('starbattle',JSON.stringify(d));
    }catch(e){}
  }
  function load(){
    try{
      var d = JSON.parse(localStorage.getItem('starbattle'));
      if(d){
        coins = d.coins||0; highScore = d.highScore||0;
        maxWave = d.maxWave||0; totalCoins = d.totalCoins||0;
        ks100 = d.ks100||0; ownedShips = d.ownedShips||[0];
        ownedWeapons = d.ownedWeapons||[0];
        dailyCollected = d.dailyCollected||false;
      }
    }catch(e){}
    // moved to init()
  }
  function checkDaily(){
    try{
      var last = localStorage.getItem('starbattle_daily');
      if(last){
        var today = new Date().toDateString();
        if(last===today){ dailyCollected=true; return; }
      }
      dailyCollected=false;
      setTimeout(function(){UI.showDaily();},500);
    }catch(e){}
  }
  function collectDaily(){
    dailyCollected=true;
    var amt = 50;
    coins+=amt; totalCoins+=amt;
    try{ localStorage.setItem('starbattle_daily',new Date().toDateString()); }catch(e){}
    save();
    UI.updateCoins();
    UI.hideDaily();
    Audio.coin();
    UI.showNotif('🎁 +50 🪙 每日奖励','');
  }

  return {
    init: init, startGame: startGame, togglePause: togglePause, quit: quit,
    getWave: function(){return wave;},
    getScore: function(){return score;},
    getKills: function(){return kills;},
    getLives: function(){return lives;},
    getCombo: function(){return combo;},
    getCoins: function(){return coins;},
    setCoins: function(v){coins=v;},
    getHighScore: function(){return highScore;},
    getMaxWave: function(){return maxWave;},
    getTotalCoins: function(){return totalCoins;},
    getShips: function(){return ships;},
    getWeapons: function(){return weapons;},
    getCurrentShip: function(){return currentShip;},
    setCurrentShip: function(v){currentShip=v;},
    getOwnedShips: function(){return ownedShips;},
    getOwnedWeapons: function(){return ownedWeapons;},
    getAchievements: function(){return achievements;},
    getDailyCollected: function(){return dailyCollected;},
    setDailyCollected: function(v){dailyCollected=v;},
    collectDaily: collectDaily,
    save: save,
    // for leaderboard
    leaderboard: [],
    addToLeaderboard: function(name,score,wave){
      this.leaderboard.push({name:name||'玩家',score:score,wave:wave});
      this.leaderboard.sort(function(a,b){return b.score-a.score;});
      if(this.leaderboard.length>10) this.leaderboard.length=10;
      try{ localStorage.setItem('starbattle_lb',JSON.stringify(this.leaderboard)); }catch(e){}
    },
    loadLeaderboard: function(){
      try{
        var d = JSON.parse(localStorage.getItem('starbattle_lb'));
        if(d) this.leaderboard = d;
      }catch(e){}
    },
    fill: function(){},
    coins: function(){return coins;}
  };
})();

      Game.setCoins(Game.getCoins()-100);
